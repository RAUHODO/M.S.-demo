<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project M.S. · Site of Grace</title>
  <link rel="stylesheet" href="css/style.css?v=phase1f">
</head>
<body>
  <header id="header">
    <div class="title-box">
      <h1 id="main-title"></h1>
      <div id="header-subtitle"></div>
    </div>
    <div class="status-bar" id="status-bar"></div>
    <button id="lang-toggle" class="lang-btn" onclick="toggleLang()">EN</button>
  </header>

  <main>
    <!-- Conversation Demo (above buildings, collapsible) -->
    <section id="conversation-section">
      <div class="accordion" id="conv-accordion"></div>
    </section>

    <!-- Building Panel -->
    <section id="buildings-section">
      <div class="section-title" id="buildings-title"></div>
      <div id="buildings-grid"></div>
      <div class="building-detail" id="building-detail" style="display:none"></div>
    </section>

    <!-- Accordion Content -->
    <section id="content-section">
      <div class="accordion" id="accordion"></div>
    </section>
  </main>

  <footer>
    <p id="footer-text">Demo with fictional data. Project M.S. is a personal AI OS project.</p>
  </footer>

  <script src="js/app.js?v=phase1e"></script>
</body>
</html>
